apiVersion: kyverno.io/v1
kind: ClusterPolicy
metadata:
  annotations:
    kubectl.kubernetes.io/last-applied-configuration: |
      {"apiVersion":"kyverno.io/v1","kind":"ClusterPolicy","metadata":{"annotations":{"policies.kyverno.io/category":"FinOps","policies.kyverno.io/description":"Intercepta deploys com label app.kubernetes.io/name=vllm e injeta automaticamente um sidecar de cache semantico (GPTCache + Redis). Economia estimada: 40-60% de chamadas GPU sem alteracao no codigo.\n","policies.kyverno.io/severity":"medium","policies.kyverno.io/title":"FinOps Auto — Injetar GPTCache em workloads vLLM"},"name":"inject-gptcache-sidecar"},"spec":{"background":false,"rules":[{"match":{"resources":{"kinds":["Deployment","StatefulSet"]}},"mutate":{"patchStrategicMerge":{"spec":{"template":{"spec":{"containers":[{"env":[{"name":"REDIS_URL","value":"redis://redis-cache.gptcache.svc.cluster.local:6379"},{"name":"SIMILARITY_THRESHOLD","value":"0.85"},{"name":"CACHE_MAX_SIZE_MB","value":"2048"},{"name":"LOG_LEVEL","value":"info"}],"image":"zilliz/gptcache:latest","name":"gptcache-sidecar","ports":[{"containerPort":8001,"name":"cache-api"}],"resources":{"limits":{"cpu":"500m","memory":"512Mi"},"requests":{"cpu":"100m","memory":"256Mi"}}}]}}}}},"name":"inject-gptcache","preconditions":{"all":[{"key":"{{request.object.metadata.labels.\"app.kubernetes.io/name\" || ''}}","operator":"Equals","value":"vllm"},{"key":"{{request.object.metadata.labels.\"ai-governance/cache\" || ''}}","operator":"Equals","value":"enabled"}]}}]}}
    policies.kyverno.io/category: FinOps
    policies.kyverno.io/description: |
      Intercepta deploys com label app.kubernetes.io/name=vllm e injeta automaticamente um sidecar de cache semantico (GPTCache + Redis). Economia estimada: 40-60% de chamadas GPU sem alteracao no codigo.
    policies.kyverno.io/severity: medium
    policies.kyverno.io/title: FinOps Auto — Injetar GPTCache em workloads vLLM
  name: inject-gptcache-sidecar
spec:
  admission: true
  background: false
  emitWarning: false
  rules:
  - match:
      resources:
        kinds:
        - Deployment
        - StatefulSet
    mutate:
      patchStrategicMerge:
        spec:
          template:
            spec:
              containers:
              - env:
                - name: REDIS_URL
                  value: redis://redis-cache.gptcache.svc.cluster.local:6379
                - name: SIMILARITY_THRESHOLD
                  value: "0.85"
                - name: CACHE_MAX_SIZE_MB
                  value: "2048"
                - name: LOG_LEVEL
                  value: info
                image: zilliz/gptcache:latest
                name: gptcache-sidecar
                ports:
                - containerPort: 8001
                  name: cache-api
                resources:
                  limits:
                    cpu: 500m
                    memory: 512Mi
                  requests:
                    cpu: 100m
                    memory: 256Mi
    name: inject-gptcache
    preconditions:
      all:
      - key: '{{request.object.metadata.labels."app.kubernetes.io/name" || ''''}}'
        operator: Equals
        value: vllm
      - key: '{{request.object.metadata.labels."ai-governance/cache" || ''''}}'
        operator: Equals
        value: enabled
    skipBackgroundRequests: true
  validationFailureAction: Audit
status:
  autogen: {}
  conditions:
  - lastTransitionTime: "2026-05-30T16:05:11Z"
    message: Ready
    reason: Succeeded
    status: "True"
    type: Ready
  rulecount:
    generate: 0
    mutate: 1
    validate: 0
    verifyimages: 0
  validatingadmissionpolicy:
    generated: false
    message: ""
